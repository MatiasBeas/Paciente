spring.application.name=Paciente
server.port=8082

spring.datasource.url=jdbc:mysql://localhost:3306/hp_Paciente_vm
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.jackson.deserialization.fail-on-unknown-properties=false

spring.mvc.pathmatch.use-suffix-pattern=false

webclient.prevision.url=${WEBCLIENT_PREVISION_URL:http://localhost:8081}
